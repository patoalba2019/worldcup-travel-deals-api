services:
  - type: web
    name: worldcup-travel-deals-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    healthCheckPath: /health
    envVars:
      - key: REQUIRE_PAID_GATEWAY
        value: "true"
      - key: PAID_GATEWAY_SECRET
        generateValue: true
