services:
  - type: web
    name: worldcup-travel-deals-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    healthCheckPath: /health
    envVars:
      - key: REQUIRE_PAID_GATEWAY
        value: "true"
      - key: PAID_GATEWAY_SECRET
        generateValue: true
      - key: PAID_GATEWAY_SECRET_HASHES
        value: 3edb013b40a9e3734ff286b419f13a076ee4c9d39afbfae2912c56d67d5f2f61
  - type: web
    name: patoapis-paid-apis
    runtime: static
    buildCommand: echo "Static marketplace ready"
    staticPublishPath: ./marketing
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
